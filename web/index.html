<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OmniLLM · chat</title>

  <!-- Lite JS stack: Alpine.js for reactivity, marked for markdown. Both are CDN-loaded;
       the app degrades to plain text if marked is unavailable (e.g. offline). -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --panel-2: #1f242e; --border: #2a313d;
      --text: #e6e9ef; --muted: #9aa4b2; --accent: #6ea8fe; --user: #2b3445; --err: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.55 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      height: 100vh; display: flex; flex-direction: column;
    }
    header {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 15px; margin: 0 8px 0 0; font-weight: 600; }
    header .grow { flex: 1; }
    label.field { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
    select, input[type=text] {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 9px; font: inherit; font-size: 13px;
    }
    input[type=text] { width: 150px; }
    .toggle { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; cursor: pointer; }
    main {
      flex: 1; overflow-y: auto; padding: 20px 16px; display: flex;
      flex-direction: column; gap: 14px; max-width: 820px; width: 100%; margin: 0 auto;
    }
    .msg { display: flex; flex-direction: column; gap: 4px; }
    .msg .who { font-size: 12px; color: var(--muted); }
    .bubble {
      padding: 10px 14px; border-radius: 12px; max-width: 100%;
      overflow-wrap: anywhere; white-space: normal;
    }
    .user .bubble { background: var(--user); align-self: flex-end; }
    .assistant .bubble { background: var(--panel); border: 1px solid var(--border); }
    .assistant.error .bubble { border-color: var(--err); color: var(--err); }
    .bubble pre {
      background: #0b0d11; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px; overflow-x: auto;
    }
    .bubble code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
    .bubble p:first-child { margin-top: 0; } .bubble p:last-child { margin-bottom: 0; }
    .badge {
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      border-radius: 999px; padding: 1px 8px; align-self: flex-start; margin-top: 2px;
    }
    .cursor::after { content: '▋'; color: var(--accent); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    footer { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--panel); }
    .composer { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }
    .composer input { flex: 1; width: auto; padding: 11px 14px; font-size: 15px; }
    button {
      background: var(--accent); color: #0b0d11; border: 0; border-radius: 8px;
      padding: 0 18px; font: inherit; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
    .empty { color: var(--muted); text-align: center; margin: auto; }
  </style>
</head>

<body x-data="chat()">
  <header>
    <h1>OmniLLM</h1>
    <label class="field">API
      <input type="text" x-model="apiBase" style="width:200px" />
    </label>
    <label class="field">backend
      <select x-model="backend">
        <option value="">server default</option>
        <option value="docker">docker</option>
        <option value="openai">openai</option>
      </select>
    </label>
    <label class="field">model
      <input type="text" x-model="model" placeholder="(default)" />
    </label>
    <label class="toggle">
      <input type="checkbox" x-model="stream" /> stream
    </label>
    <span class="grow"></span>
    <button @click="reset()" style="background:var(--panel-2);color:var(--text)">clear</button>
  </header>

  <main x-ref="scroll">
    <template x-if="messages.length === 0">
      <div class="empty">Ask anything. Pick a backend above, or leave it on the server default.</div>
    </template>

    <template x-for="(m, i) in messages" :key="i">
      <div class="msg" :class="m.role + (m.error ? ' error' : '')">
        <div class="who" x-text="m.role === 'user' ? 'you' : 'assistant'"></div>
        <div class="bubble" :class="{ cursor: m.streaming }" x-html="render(m.content)"></div>
        <template x-if="m.meta">
          <span class="badge" x-text="m.meta"></span>
        </template>
      </div>
    </template>
  </main>

  <footer>
    <form class="composer" @submit.prevent="send()">
      <input type="text" x-model="input" placeholder="Type a message…" :disabled="busy" autofocus />
      <button type="submit" :disabled="busy || !input.trim()" x-text="busy ? '…' : 'Send'"></button>
    </form>
  </footer>

  <script>
    function chat() {
      return {
        apiBase: 'http://localhost:8080',   // the backend; editable in the header field
        backend: '', model: '', stream: true,
        input: '', messages: [], busy: false,

        render(text) {
          if (!text) return '';
          return window.marked ? window.marked.parse(text) : escapeHtml(text);
        },
        scrollDown() { this.$nextTick(() => { const s = this.$refs.scroll; s.scrollTop = s.scrollHeight; }); },
        reset() { this.messages = []; },

        send() {
          const text = this.input.trim();
          if (!text || this.busy) return;
          this.input = '';
          this.messages.push({ role: 'user', content: text });
          this.messages.push({ role: 'assistant', content: '', streaming: true, meta: '' });
          // Mutate the REACTIVE element from the array (push wraps it in a proxy); holding the
          // pre-push raw object would bypass Alpine's setters and the UI would never update.
          const assistant = this.messages[this.messages.length - 1];
          this.busy = true; this.scrollDown();
          (this.stream ? this.runStream(text, assistant) : this.runBlocking(text, assistant));
        },

        params(text) {
          const p = new URLSearchParams({ message: text });
          if (this.backend) p.set('backend', this.backend);
          if (this.model.trim()) p.set('model', this.model.trim());
          return p;
        },

        // --- blocking: POST /chat -------------------------------------------------
        async runBlocking(text, assistant) {
          try {
            const res = await fetch(this.apiBase + '/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                message: text,
                backend: this.backend || undefined,
                model: this.model.trim() || undefined,
              }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.detail || data.message || ('HTTP ' + res.status));
            assistant.content = data.reply || '';
            assistant.meta = `${data.backend} · ${data.model}`;
          } catch (e) {
            this.fail(assistant, e);
          } finally {
            assistant.streaming = false; this.busy = false; this.scrollDown();
          }
        },

        // --- streaming: GET /chat/stream via EventSource --------------------------
        runStream(text, assistant) {
          // Wire format is JSON per event: {"t":"..."} tokens, a named "done" event with
          // {backend,model}, and a named "error" event. Plain EventSource + JSON.parse.
          const es = new EventSource(this.apiBase + '/chat/stream?' + this.params(text).toString());
          const stop = () => { es.close(); assistant.streaming = false; this.busy = false; this.scrollDown(); };

          es.onmessage = (e) => {
            try { assistant.content += JSON.parse(e.data).t ?? ''; } catch { assistant.content += e.data; }
            this.scrollDown();
          };
          es.addEventListener('done', (e) => {
            try { const d = JSON.parse(e.data); assistant.meta = `${d.backend} · ${d.model}`; } catch {}
            stop();
          });
          es.addEventListener('error', (e) => {
            // 'error' is overloaded: it fires both for our server-sent error event (carries data)
            // and for EventSource's own transport events. Only treat it as a real failure when the
            // server sent an error payload, or the connection is permanently CLOSED with no reply.
            if (e.data) {
              let msg = 'stream failed';
              try { msg = JSON.parse(e.data).message || msg; } catch {}
              if (!assistant.content) this.fail(assistant, new Error(msg));
              stop();
            } else if (es.readyState === EventSource.CLOSED) {
              if (!assistant.content) this.fail(assistant, new Error('stream connection failed'));
              stop();
            }
          });
        },

        fail(assistant, err) {
          assistant.error = true;
          assistant.content = '⚠ ' + (err.message || err);
        },
      };
    }
    function escapeHtml(s) {
      return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
  </script>
</body>
</html>
